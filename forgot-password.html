<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Mini Complaint System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page" data-auth-page="true">
    <nav class="topbar">
        <div class="brand">ComplaintCare</div>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="index.html">Complaints</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="login.html" id="authLink" class="auth-link">Login</a>
        </div>
    </nav>

    <main class="page-shell auth-wrapper">
        <section class="login-layout single-card-layout">
            <div class="panel login-card auth-card centered-card">
                <span class="auth-badge">Password Help</span>
                <h2>Forgot your password?</h2>
                <p class="section-text">Enter your email address and we will send a demo reset message.</p>

                <form id="forgotPasswordForm">
                    <div class="form-group">
                        <label for="forgotEmail">Email Address</label>
                        <div class="input-wrap">
                            <span class="input-icon"></span>
                            <input type="email" id="forgotEmail" placeholder="Enter your registered email" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">Send Reset Link</button>
                </form>

                <p id="forgotStatus" class="login-status"></p>

                <div class="auth-footer">
                    Remembered your password? <a href="login.html">Back to login</a>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
